name: Run Stock Engine

on:
  schedule:
    # Runs every 30 minutes, Monday-Friday during broad NYSE market hours in UTC
    - cron: '*/30 13-21 * * 1-5'

  workflow_dispatch:
    inputs:
      action:
        description: 'Choose Action'
        required: true
        default: 'Run Stocks'
        type: choice
        options:
          - 'Run Stocks'
          - 'Add to Watchlist'
          - 'Remove from Watchlist'
      manual_tickers:
        description: 'Enter Tickers (comma separated, e.g., AAPL, TSLA)'
        required: false
        default: ''

concurrency:
  group: stock-engine-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-analytics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Update Watchlist
        if: github.event.inputs.action == 'Add to Watchlist' || github.event.inputs.action == 'Remove from Watchlist'
        run: |
          CLEAN_TICKERS=$(echo "${{ github.event.inputs.manual_tickers }}" | tr ',' ' ')

          if [ "${{ github.event.inputs.action }}" = "Add to Watchlist" ]; then
            python main.py --add $CLEAN_TICKERS
          elif [ "${{ github.event.inputs.action }}" = "Remove from Watchlist" ]; then
            python main.py --remove $CLEAN_TICKERS
          fi

      - name: Execute Stock Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MANUAL_TICKERS: ${{ github.event.inputs.manual_tickers }}
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.action == 'Run Stocks' ||
          github.event.inputs.action == ''
        run: |
          python main.py --init-db
          python main.py --analyze
          python main.py --quant-report
          python main.py --portfolio-report
          python main.py --stock-discovery
          python main.py --dashboard

      - name: Debug - List Files
        if: always()
        run: ls -R

      - name: Upload Trend Charts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-plots
          path: plots/
          if-no-files-found: warn

      - name: Upload Execution Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: logs/
          if-no-files-found: ignore

      - name: Upload Research State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-state
          path: |
            state/
            cache/
            watchlist.json
            portfolio.json
            config/screeners.json
            plots/quant_research_dashboard.html
          if-no-files-found: warn

      - name: Commit and Push Changes
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -f state/ || true
          git add watchlist.json || true
          git add portfolio.json || true
          git add -f config/screeners.json || true
          git add -f cache/*.json || true
          git add -f cache/fundamentals/ || true
          git add -f plots/quant_research_dashboard.html || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update engine state, cache, reports, and watchlist [automated]"
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="FO Engine Alert: The stock scan workflow has failed. Check GitHub Actions for logs."
