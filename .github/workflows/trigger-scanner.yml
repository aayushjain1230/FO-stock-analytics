name: Trigger Scanner

on:
  schedule:
    # Lightweight scanner every 5 minutes during broad NYSE market hours in UTC.
    # GitHub Actions schedules may be delayed; use Render/Railway/VPS for true 1-minute monitoring.
    - cron: '*/5 13-21 * * 1-5'

  workflow_dispatch:

concurrency:
  group: trigger-scanner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-triggers:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Lightweight Trigger Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --intraday-monitor

      - name: Commit Scanner State
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -f state/intraday_monitor_state.json || true

          if git diff --staged --quiet; then
            echo "No scanner state changes to commit."
          else
            git commit -m "Update trigger scanner state [automated]"
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="FO Engine Alert: Trigger scanner workflow failed. Check GitHub Actions logs."
